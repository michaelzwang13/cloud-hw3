AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AI Photo Search — basic infrastructure template (T1).
  Spins up: photo storage bucket, frontend website bucket, two Lambda
  functions (indexing + search) with inline stub code, and an API Gateway
  REST API with PUT /photos and GET /search routes wired to the lambdas.

Parameters:
  ProjectName:
    Type: String
    Default: cloud-hw3
    Description: Used as a prefix for resource names.

Resources:

  # ---- S3: photo storage bucket -------------------------------------------
  PhotoStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-photos-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, HEAD]
            AllowedOrigins: ["*"]

  PhotoStorageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref PhotoStorageBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${PhotoStorageBucket.Arn}/*"

  # ---- S3: frontend website bucket ----------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadFrontend
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ---- IAM: shared Lambda execution role ----------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PhotoAppAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:HeadObject
                Resource: !Sub "${PhotoStorageBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - rekognition:DetectLabels
                Resource: "*"

  # ---- Lambda: indexing function (LF1) ------------------------------------
  IndexingLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-LF1"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          // LF1 — indexing stub. Replace with real logic that reads the S3
          // event, calls Rekognition.DetectLabels, and indexes into OpenSearch.
          exports.handler = async (event) => {
            console.log("LF1 event:", JSON.stringify(event));
            return { statusCode: 200, body: "indexed (stub)" };
          };

  # ---- Lambda: search function (LF2) --------------------------------------
  SearchLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-LF2"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        ZipFile: |
          // LF2 — search stub. Replace with real logic that disambiguates
          // via Lex and queries OpenSearch for matching photos.
          exports.handler = async (event) => {
            console.log("LF2 event:", JSON.stringify(event));
            const q = (event.queryStringParameters && event.queryStringParameters.q) || "";
            return {
              statusCode: 200,
              headers: {
                "Content-Type": "application/json",
                "Access-Control-Allow-Origin": "*",
              },
              body: JSON.stringify({ query: q, results: [] }),
            };
          };

  # ---- API Gateway: REST API ----------------------------------------------
  Api:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-api"
      EndpointConfiguration:
        Types: [REGIONAL]
      BinaryMediaTypes:
        - image/jpeg
        - image/png

  PhotosResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref Api
      ParentId: !GetAtt Api.RootResourceId
      PathPart: photos

  SearchResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref Api
      ParentId: !GetAtt Api.RootResourceId
      PathPart: search

  # PUT /photos → IndexingLambda (proxy)
  PhotosPutMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref PhotosResource
      HttpMethod: PUT
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${IndexingLambda.Arn}/invocations"

  # GET /search → SearchLambda (proxy)
  SearchGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref Api
      ResourceId: !Ref SearchResource
      HttpMethod: GET
      AuthorizationType: NONE
      RequestParameters:
        method.request.querystring.q: false
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SearchLambda.Arn}/invocations"

  IndexingLambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref IndexingLambda
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/PUT/photos"

  SearchLambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SearchLambda
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/*/GET/search"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PhotosPutMethod
      - SearchGetMethod
    Properties:
      RestApiId: !Ref Api

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref Api
      DeploymentId: !Ref ApiDeployment
      StageName: dev

Outputs:
  FrontendWebsiteURL:
    Description: Public URL of the frontend S3 website.
    Value: !GetAtt FrontendBucket.WebsiteURL

  FrontendBucketName:
    Description: Frontend bucket (upload your index.html here).
    Value: !Ref FrontendBucket

  PhotoStorageBucketName:
    Description: Photo storage bucket.
    Value: !Ref PhotoStorageBucket

  ApiInvokeURL:
    Description: API Gateway invoke URL (use for /search and /photos).
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/${ApiStage}"

  IndexingLambdaName:
    Value: !Ref IndexingLambda

  SearchLambdaName:
    Value: !Ref SearchLambda
